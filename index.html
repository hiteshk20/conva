<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesignStudio Pro - Next Gen Design Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow: hidden; background-color: #f1f5f9; }
        #canvas-container {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            cursor: grab;
        }
        #canvas-container:active { cursor: grabbing; }
        canvas { touch-action: none; }
        .tool-btn { @apply p-2 hover:bg-gray-100 rounded-md transition-colors text-gray-600; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans text-gray-900">

    <!-- Top Header -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 z-20 shadow-sm">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white p-1.5 rounded-lg font-bold text-xl leading-none">DS</div>
                <h1 class="font-bold text-gray-800 text-lg hidden md:block">DesignStudio <span class="text-blue-600">Pro</span></h1>
            </div>
            
            <div class="flex items-center gap-1 border-l pl-6 border-gray-200">
                <button id="undo-btn" class="p-2 hover:bg-gray-100 rounded-full text-gray-500" title="Undo (Ctrl+Z)">↩️</button>
                <button id="redo-btn" class="p-2 hover:bg-gray-100 rounded-full text-gray-500" title="Redo (Ctrl+Y)">↪️</button>
            </div>

            <!-- Alignment Toolbar -->
            <div class="hidden lg:flex items-center gap-1 border-l pl-6 border-gray-200">
                <button id="align-left" class="p-2 hover:bg-gray-100 rounded-md text-gray-600" title="Align Left">⬅️</button>
                <button id="align-center" class="p-2 hover:bg-gray-100 rounded-md text-gray-600" title="Align Center">↔️</button>
                <button id="align-right" class="p-2 hover:bg-gray-100 rounded-md text-gray-600" title="Align Right">➡️</button>
                <div class="w-px h-4 bg-gray-300 mx-1"></div>
                <button id="align-top" class="p-2 hover:bg-gray-100 rounded-md text-gray-600" title="Align Top">⬆️</button>
                <button id="align-middle" class="p-2 hover:bg-gray-100 rounded-md text-gray-600" title="Align Middle">↕️</button>
                <button id="align-bottom" class="p-2 hover:bg-gray-100 rounded-md text-gray-600" title="Align Bottom">⬇️</button>
            </div>
        </div>

        <!-- Dynamic Property Bar -->
        <div id="property-bar" class="flex items-center gap-4 flex-1 justify-center px-4">
            <div id="general-controls" class="flex items-center gap-4 hidden bg-gray-50 p-1 px-3 rounded-full border border-gray-200">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Fill</span>
                    <input type="color" id="prop-color" class="w-6 h-6 border-none cursor-pointer bg-transparent">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Opacity</span>
                    <input type="range" id="prop-opacity" min="0" max="1" step="0.1" class="w-20">
                </div>
                
                <div id="text-controls" class="flex items-center gap-3 pl-3 border-l border-gray-300 hidden">
                    <input type="text" id="prop-text-input" class="border border-gray-300 rounded px-2 py-1 text-xs w-32" placeholder="Text content">
                    <input type="number" id="prop-font-size" class="border border-gray-300 rounded px-2 py-1 text-xs w-12">
                    <select id="prop-font-family" class="border border-gray-300 rounded px-2 py-1 text-xs">
                        <option value="Arial">Arial</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Impact">Impact</option>
                    </select>
                    <select id="prop-text-align" class="border border-gray-300 rounded px-2 py-1 text-xs">
                        <option value="left">Left</option>
                        <option value="center">Center</option>
                        <option value="right">Right</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button id="clear-btn" class="px-3 py-1.5 text-xs font-medium text-gray-500 hover:text-red-500 transition-colors">Clear</button>
            <button id="export-btn" class="px-4 py-1.5 bg-blue-600 text-white text-xs font-semibold rounded-lg hover:bg-blue-700 transition-all shadow-sm">Export</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Left Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col z-10">
            <div class="p-4 border-b border-gray-100">
                <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Toolkit</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div id="shape-container" class="grid grid-cols-1 gap-1 mb-8"></div>

                <div class="mb-8">
                    <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Media</h2>
                    <button id="upload-image" class="flex items-center justify-center p-6 border-2 border-dashed border-gray-200 rounded-xl hover:border-blue-400 hover:bg-blue-50 transition-all group text-center">
                        <div>
                            <div class="text-2xl mb-1 group-hover:scale-110 transition-transform">🖼️</div>
                            <div class="text-xs font-medium text-gray-500">Upload Image</div>
                        </div>
                    </button>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>

                <div>
                    <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Templates</h2>
                    <div id="template-container" class="flex flex-col gap-2"></div>
                </div>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main id="canvas-container" class="flex-1 relative overflow-hidden flex items-center justify-center p-8">
            <canvas id="main-canvas" class="bg-white shadow-2xl rounded-sm" style="width: 1200px; height: 800px;"></canvas>
        </main>

        <!-- Right Sidebar -->
        <aside class="w-64 bg-white border-l border-gray-200 flex flex-col z-10">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Layers</h2>
                <span class="text-[9px] bg-gray-100 px-2 py-0.5 rounded text-gray-500 font-mono">Z-STACK</span>
            </div>
            <div id="layers-list" class="flex-1 overflow-y-auto p-4"></div>
        </aside>
    </div>

    <script type="module" src="js/main.js"></script>

</html>

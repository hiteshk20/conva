<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesignStudio - Professional Object-Oriented Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            overflow: hidden;
            background-color: #f8fafc;
        }
        #canvas-container {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        canvas {
            cursor: crosshair;
            touch-action: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col font-sans text-gray-900">

    <!-- Top Header / Property Bar -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 z-20">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 text-white p-2 rounded-lg font-bold text-lg">DS</div>
            <h1 class="font-semibold text-gray-700">DesignStudio <span class="text-gray-400 font-normal ml-2 text-sm">v1.0</span></h1>
        </div>

        <!-- Contextual Property Bar -->
        <div id="property-bar" class="flex items-center gap-6 flex-1 justify-center px-10">
            <div id="general-controls" class="flex items-center gap-4 hidden">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-semibold text-gray-500 uppercase">Fill</span>
                    <input type="color" id="prop-color" class="w-8 h-8 border-none cursor-pointer bg-transparent">
                </div>
                
                <div id="text-controls" class="flex items-center gap-4 pl-4 border-l border-gray-200 hidden">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-semibold text-gray-500 uppercase">Text</span>
                        <input type="text" id="prop-text-input" class="border border-gray-300 rounded px-2 py-1 text-sm w-40">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-semibold text-gray-500 uppercase">Size</span>
                        <input type="number" id="prop-font-size" class="border border-gray-300 rounded px-2 py-1 text-sm w-16">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-semibold text-gray-500 uppercase">Font</span>
                        <select id="prop-font-family" class="border border-gray-300 rounded px-2 py-1 text-sm">
                            <option value="Arial">Arial</option>
                            <option value="Verdana">Verdana</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Courier New">Courier New</option>
                            <option value="Impact">Impact</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-semibold text-gray-500 uppercase">Align</span>
                        <select id="prop-text-align" class="border border-gray-300 rounded px-2 py-1 text-sm">
                            <option value="left">Left</option>
                            <option value="center">Center</option>
                            <option value="right">Right</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button id="clear-btn" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-red-500 transition-colors">Clear</button>
            <button id="export-btn" class="px-4 py-2 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-all shadow-sm">Export PNG</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Left Sidebar: Assets -->
        <aside class="w-72 bg-white border-r border-gray-200 flex flex-col z-10">
            <div class="p-4 border-b border-gray-100">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Elements</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div id="shape-container" class="grid grid-cols-1 gap-2 mb-8">
                    <!-- Shapes added by JS -->
                </div>

                <div class="mb-8">
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Media</h2>
                    <button id="upload-image" class="flex items-center justify-center p-4 border-2 border-dashed border-gray-300 rounded-xl hover:border-blue-400 hover:bg-blue-50 transition-all group">
                        <div class="text-center">
                            <div class="text-2xl mb-1 group-hover:scale-110 transition-transform">🖼️</div>
                            <div class="text-xs font-medium text-gray-500">Upload Image</div>
                        </div>
                    </button>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>

                <div>
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Templates</h2>
                    <div id="template-container" class="flex flex-col gap-2">
                        <!-- Templates added by JS -->
                    </div>
                </div>
            </div>
        </aside>

        <!-- Center: Canvas Area -->
        <main id="canvas-container" class="flex-1 relative overflow-hidden flex items-center justify-center p-10">
            <canvas id="main-canvas" class="bg-white shadow-2xl rounded-sm" style="width: 1200px; height: 800px;"></canvas>
        </main>

        <!-- Right Sidebar: Layers -->
        <aside class="w-72 bg-white border-l border-gray-200 flex flex-col z-10">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Layers</h2>
                <span class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-500 font-mono">Z-ORDER</span>
            </div>
            <div id="layers-list" class="flex-1 overflow-y-auto p-4">
                <!-- Layers added by JS -->
            </div>
        </aside>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
    <script type="module">
        // We need to make the Engine class available since it's used in main.js but 
        // for this specific build, I'll put everything in modules.
        // Actually, I'll move the class definitions to separate files.
    </script>
    <!-- Wait, I need to make sure Engine and UI are imported in main.js -->
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesignStudio Enterprise v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow: hidden; background-color: #f1f5f9; transition: background 0.3s; }
        .dark-theme { background-color: #0f172a; color: #f1f5f9; }
        .dark-theme .bg-white { background-color: #1e293b !important; color: #f1f5f9; }
        .dark-theme .text-gray-600, .dark-theme .text-gray-700 { color: #cbd5e1 !important; }
        .dark-theme .border-gray-200 { border-color: #334155 !important; }
        .dark-theme .bg-gray-100 { background-color: #334155 !important; }
        #canvas-container {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            cursor: grab;
        }
        #canvas-container:active { cursor: grabbing; }
        canvas { touch-action: none; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">

    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 z-20 shadow-sm">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg font-bold text-xl leading-none">DS</div>
            <h1 class="font-bold text-gray-800 text-lg hidden md:block">DesignStudio <span class="text-blue-600">Enterprise</span></h1>
            
            <div class="flex items-center gap-1 border-l pl-4 border-gray-200">
                <button id="undo-btn" class="p-2 hover:bg-gray-100 rounded-full" title="Undo">↩️</button>
                <button id="redo-btn" class="p-2 hover:bg-gray-100 rounded-full" title="Redo">↪️</button>
            </div>

            <div class="flex items-center gap-1 border-l pl-4 border-gray-200">
                <button id="group-btn" class="p-2 hover:bg-gray-100 rounded-md text-xs font-bold" title="Group">📦 Group</button>
                <button id="ungroup-btn" class="p-2 hover:bg-gray-100 rounded-md text-xs font-bold" title="Ungroup">🔓 Ungroup</button>
            </div>

            <div class="flex items-center gap-1 border-l pl-4 border-gray-200">
                <button id="save-btn" class="p-2 hover:bg-gray-100 rounded-md text-xs font-bold" title="Export Project">💾 Save</button>
                <button id="load-btn" class="p-2 hover:bg-gray-100 rounded-md text-xs font-bold" title="Import Project">📂 Load</button>
            </div>
        </div>

        <div id="property-bar" class="flex items-center gap-4 flex-1 justify-center px-4">
            <div id="general-controls" class="flex items-center gap-4 hidden bg-gray-50 p-1 px-3 rounded-full border border-gray-200">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Color</span>
                    <input type="color" id="prop-color" class="w-6 h-6 border-none bg-transparent">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Opacity</span>
                    <input type="range" id="prop-opacity" min="0" max="1" step="0.1" class="w-16">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Fill</span>
                    <select id="prop-gradient" class="border rounded px-1 text-xs">
                        <option value="none">Solid</option>
                        <option value="linear">Linear Grad</option>
                    </select>
                </div>
                <div id="text-controls" class="flex items-center gap-3 pl-3 border-l border-gray-300 hidden">
                    <input type="text" id="prop-text-input" class="border rounded px-2 py-1 text-xs w-32">
                    <input type="number" id="prop-font-size" class="border rounded px-2 py-1 text-xs w-12">
                    <select id="prop-font-family" class="border rounded px-2 py-1 text-xs">
                        <option value="Arial">Arial</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Impact">Impact</option>
                    </select>
                    <select id="prop-text-align" class="border rounded px-2 py-1 text-xs">
                        <option value="left">Left</option>
                        <option value="center">Center</option>
                        <option value="right">Right</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button id="dark-mode" class="p-2 hover:bg-gray-100 rounded-full" title="Toggle Dark Mode">🌓</button>
            <button id="export-btn" class="px-4 py-1.5 bg-blue-600 text-white text-xs font-semibold rounded-lg hover:bg-blue-700 shadow-sm">Export PNG</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col z-10">
            <div class="p-4 border-b border-gray-100 font-bold text-[10px] text-gray-400 uppercase tracking-widest">Toolkit</div>
            <div class="flex-1 overflow-y-auto p-4">
                <div id="shape-container" class="grid grid-cols-1 gap-1 mb-8"></div>
                <div class="mb-8">
                    <div class="font-bold text-[10px] text-gray-400 uppercase tracking-widest mb-3">Media</div>
                    <button id="upload-image" class="flex items-center justify-center p-6 border-2 border-dashed border-gray-200 rounded-xl hover:border-blue-400 transition-all group text-center">
                        <div class="text-center">
                            <div class="text-2xl mb-1 group-hover:scale-110 transition-transform">🖼️</div>
                            <div class="text-xs font-medium text-gray-500">Upload Image</div>
                        </div>
                    </button>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>
                <div class="mb-8">
                    <div class="font-bold text-[10px] text-gray-400 uppercase tracking-widest mb-3">Canvas Presets</div>
                    <div id="preset-container" class="flex flex-col gap-1"></div>
                </div>
                <div>
                    <div class="font-bold text-[10px] text-gray-400 uppercase tracking-widest mb-3">Templates</div>
                    <div id="template-container" class="flex flex-col gap-1"></div>
                </div>
            </div>
        </aside>

        <main id="canvas-container" class="flex-1 relative overflow-hidden flex items-center justify-center p-8">
            <canvas id="main-canvas" class="bg-white shadow-2xl rounded-sm" style="width: 1200px; height: 800px;"></canvas>
        </main>

        <aside class="w-72 bg-white border-l border-gray-200 flex flex-col z-10">
            <div class="p-4 border-b border-gray-100 font-bold text-[10px] text-gray-400 uppercase tracking-widest">Properties</div>
            <div id="props-panel" class="p-4 flex flex-col gap-4">
                <div class="grid grid-cols-2 gap-2">
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] font-bold text-gray-400">X POS</span>
                        <input type="number" id="prop-x" class="border rounded px-2 py-1 text-xs bg-gray-50">
                    </div>
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] font-bold text-gray-400">Y POS</span>
                        <input type="number" id="prop-y" class="border rounded px-2 py-1 text-xs bg-gray-50">
                    </div>
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] font-bold text-gray-400">WIDTH</span>
                        <input type="number" id="prop-w" class="border rounded px-2 py-1 text-xs bg-gray-50">
                    </div>
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] font-bold text-gray-400">HEIGHT</span>
                        <input type="number" id="prop-h" class="border rounded px-2 py-1 text-xs bg-gray-50">
                    </div>
                </div>
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg border border-gray-200">
                    <span class="text-xs font-bold text-gray-600">Snap to Grid</span>
                    <input type="checkbox" id="snap-grid" class="w-4 h-4">
                </div>
            </div>
            <div class="p-4 border-t border-gray-100 font-bold text-[10px] text-gray-400 uppercase tracking-widest">Layers</div>
            <div id="layers-list" class="flex-1 overflow-y-auto p-4"></div>
        </aside>
    </div>

    <script type="module" src="js/main.js"></script>

</html>
